services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clinic_booking
    ports:
      - "5432:5432"
    volumes:
      - clinic_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/clinic_booking
      CORS_ALLOWED_ORIGINS: '["*"]'
      LOG_JSON: "false"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"

volumes:
  clinic_db_data:
